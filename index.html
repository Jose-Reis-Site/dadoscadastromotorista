<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificação de Motoristas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
    <style>
        body { background-color: #f4f7f6; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .col-identificada { background-color: #fff9c4 !important; min-width: 200px; }
        .input-motorista { border: 1px solid #ffa000; border-radius: 4px; padding: 5px; width: 100%; }
        table thead { background-color: #343a40; color: white; }
        .saved-row { opacity: 0.5; background-color: #d4edda !important; transition: all 0.5s ease; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section text-center mb-4">
        <h2>Filtro de Motoristas Desconhecidos</h2>
        <p id="status-text" class="text-muted">Carregando base de dados...</p>
    </div>

    <div id="tabela-container" style="display: none;">
        <table id="dadosTabela" class="table table-sm table-hover table-bordered w-100">
            <thead><tr id="tableHeader"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

<script>
$(document).ready(function() {
    // URL do seu CSV publicado
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS4075sYsvoz_4YZmDnxQRUoVWE86-yamQ4UkCtyYz3ZEJM3qoTdmr1q4IW4ARKCw8rJ1HQMAvNyinA/pub?gid=0&single=true&output=csv';
    // URL do seu Web App (Após publicar o script acima)
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw_GJ5h83wRmHxyys-PSgjyNzBZyAb0jJiLJwqPuJx-AxOjzucxt0Nsr3g8JGhal7lPzw/exec'; 

    let table;

    Papa.parse(CSV_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            let data = results.data;
            let columns = results.meta.fields;

            const colIdentificado = "Motorista Identificado";
            const colAcao = "Ação";
            
            let headerHtml = `<th>${colIdentificado}</th>`;
            columns.forEach(col => { headerHtml += `<th>${col}</th>`; });
            headerHtml += `<th>${colAcao}</th>`;
            $('#tableHeader').html(headerHtml);

            data.forEach((row, idx) => {
                let htmlRow = `<tr>`;
                htmlRow += `<td class="col-identificada"><input type="text" class="input-motorista" placeholder="Nome do motorista..."></td>`;
                columns.forEach(col => {
                    htmlRow += `<td>${row[col] || ''}</td>`;
                });
                htmlRow += `<td><button class="btn btn-primary btn-sm btn-save">Salvar</button></td>`;
                htmlRow += `</tr>`;
                $('#tableBody').append(htmlRow);
            });

            $('#status-text').text("Mostrando apenas registros Unknown e Unmatched");
            $('#tabela-container').show();

            table = $('#dadosTabela').DataTable({
                language: { url: '//cdn.datatables.net/plug-ins/1.13.4/i18n/pt-BR.json' },
                pageLength: 25,
                initComplete: function() {
                    let columnIndex = -1;
                    $('#tableHeader th').each(function(i) {
                        if ($(this).text() === "Motorista") columnIndex = i;
                    });

                    if(columnIndex !== -1) {
                        // Filtra para exibir APENAS o que precisa ser identificado
                        this.api().column(columnIndex).search('Unmatched|Unknown', true, false).draw();
                    }
                }
            });
        }
    });

    $('#tableBody').on('click', '.btn-save', function() {
        const rowBtn = $(this);
        const rowElement = rowBtn.closest('tr');
        const novoNome = rowElement.find('.input-motorista').val();

        if (!novoNome) {
            alert("Digite um nome antes de salvar!");
            return;
        }

        rowBtn.prop('disabled', true).text('⏳');

        let dadosLinha = {};
        const cabecalhos = [];
        $('#tableHeader th').each(function() { cabecalhos.push($(this).text()); });

        rowElement.find('td').each(function(i) {
            let titulo = cabecalhos[i];
            if (titulo === "Motorista Identificado") {
                dadosLinha[titulo] = novoNome;
            } else if (titulo !== "Ação") {
                dadosLinha[titulo] = $(this).text();
            }
        });

        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(dadosLinha)
        })
        .then(() => {
            // Feedback visual de sucesso
            rowBtn.text('✅').removeClass('btn-primary').addClass('btn-success');
            rowElement.addClass('saved-row');
            rowElement.find('input').prop('disabled', true);

            // REMOVE A LINHA DA TABELA APÓS 1 SEGUNDO
            setTimeout(() => {
                table.row(rowElement).remove().draw(false);
            }, 1000);
        })
        .catch(() => {
            alert("Erro ao salvar");
            rowBtn.prop('disabled', false).text('Salvar');
        });
    });
});
</script>
</body>
</html>
